 <h1>Bienvenue sur le café virtuel du J </h1>

 <input 
    #input
    (keyup.enter)="selectMenu(input.value)"
    type="number" 
  />

  <p>Veuillez sélectionner un menu :</p>
  
  <p *ngFor="let m of listMenu">
    {{ m.name }}
  </p>

  <p *ngIf="menuSelected"> 
    Cher client vous avez selectionner le menu : {{ menuSelected.name }}
  </p>

  <p *ngIf="!menuSelected"> 
    Cher client nous avons aucun menu disponible à l'index sélectionné. Veuillez réessayer.
  </p>
